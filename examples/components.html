<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>components // fazolin/design-system</title>
<link rel="stylesheet" href="../tokens/colors.css">
<link rel="stylesheet" href="../tokens/typography.css">
<link rel="stylesheet" href="../tokens/glitch.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: var(--color-void); color: var(--color-signal); min-height: 100vh; font-family: var(--font-hud); }
body { padding: 56px 64px; display: flex; flex-direction: column; gap: 40px; }

.head {
    display: flex; justify-content: space-between; align-items: flex-end;
    border-bottom: 1px solid var(--color-signal);
    padding-bottom: 18px;
}
.head .id { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; }
.head .meta { font-size: 11px; letter-spacing: 0.15em; color: var(--color-mesh); text-transform: uppercase; }

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px;
}

.card {
    border: 1px solid rgba(240, 240, 240, 0.12);
    display: flex;
    flex-direction: column;
}

.card__header {
    display: flex;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(240, 240, 240, 0.12);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
}
.card__header a {
    color: var(--color-mesh);
    text-decoration: none;
    transition: color 120ms linear;
}
.card__header a:hover { color: var(--color-corrupt); animation: fx-flash 80ms steps(2, end) 1; }

iframe {
    width: 100%;
    height: 360px;
    border: 0;
    background: var(--color-void);
}
</style>
</head>
<body>

<header class="head">
    <div class="id">components // fazolin / design-system</div>
    <div class="meta">8 components // each is its own page</div>
</header>

<div class="grid">
    <div class="card">
        <div class="card__header"><span>// button</span><a href="../components/button.html" target="_blank">OPEN ISOLATED →</a></div>
        <iframe src="../components/button.html" loading="lazy"></iframe>
    </div>
    <div class="card">
        <div class="card__header"><span>// slider</span><a href="../components/slider.html" target="_blank">OPEN ISOLATED →</a></div>
        <iframe src="../components/slider.html" loading="lazy"></iframe>
    </div>
    <div class="card">
        <div class="card__header"><span>// input</span><a href="../components/input.html" target="_blank">OPEN ISOLATED →</a></div>
        <iframe src="../components/input.html" loading="lazy"></iframe>
    </div>
    <div class="card">
        <div class="card__header"><span>// loading</span><a href="../components/loading.html" target="_blank">OPEN ISOLATED →</a></div>
        <iframe src="../components/loading.html" loading="lazy"></iframe>
    </div>
    <div class="card">
        <div class="card__header"><span>// status</span><a href="../components/status.html" target="_blank">OPEN ISOLATED →</a></div>
        <iframe src="../components/status.html" loading="lazy"></iframe>
    </div>
    <div class="card">
        <div class="card__header"><span>// nav</span><a href="../components/nav.html" target="_blank">OPEN ISOLATED →</a></div>
        <iframe src="../components/nav.html" loading="lazy"></iframe>
    </div>
    <div class="card">
        <div class="card__header"><span>// webcam</span><a href="../components/webcam.html" target="_blank">OPEN ISOLATED →</a></div>
        <iframe src="../components/webcam.html" loading="lazy"></iframe>
    </div>
    <div class="card">
        <div class="card__header"><span>// audio-visualizer</span><a href="../components/audio-visualizer.html" target="_blank">OPEN ISOLATED →</a></div>
        <iframe src="../components/audio-visualizer.html" loading="lazy"></iframe>
    </div>
</div>

</body>
</html>
