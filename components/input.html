<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>input // fazolin/design-system</title>
<link rel="stylesheet" href="../tokens/colors.css">
<link rel="stylesheet" href="../tokens/typography.css">
<link rel="stylesheet" href="../tokens/glitch.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    background: var(--color-void);
    color: var(--color-signal);
    min-height: 100vh;
    font-family: var(--font-hud);
}
body { padding: 56px 64px; display: flex; flex-direction: column; gap: 48px; max-width: 560px; }

.section-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--color-mesh);
    border-bottom: 1px solid var(--color-mesh-dim);
    padding-bottom: 8px;
    margin-bottom: 24px;
}

.field { display: flex; flex-direction: column; gap: 8px; }

.field__label {
    font-family: var(--font-hud);
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--color-signal);
    opacity: 0.6;
    margin-bottom: 6px;
}

.input {
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--color-signal);
    padding: 8px 0;
    font-family: var(--font-hud);
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.05em;
    color: var(--color-signal);
    width: 100%;
    outline: none;
    caret-color: var(--color-signal);
    caret-shape: block;
}

.input::placeholder {
    color: var(--color-signal);
    opacity: 0.2;
}

.input:focus {
    border-bottom-color: var(--color-mesh);
    caret-color: var(--color-mesh);
}

.input.is-invalid {
    border-bottom-color: var(--color-corrupt);
    caret-color: var(--color-corrupt);
}

.input:disabled, .field--disabled .input {
    opacity: 0.3;
    cursor: not-allowed;
}

.field__helper {
    font-family: var(--font-hud);
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--color-signal);
    opacity: 0.5;
}

.field__helper--error {
    color: var(--color-corrupt);
    opacity: 1;
}
</style>
</head>
<body>

<div class="section-label">// default + focus</div>

<div class="field">
    <label class="field__label">HOSTNAME</label>
    <input type="text" class="input" placeholder="fazolin.com">
    <span class="field__helper">resolves via dns</span>
</div>

<div class="field">
    <label class="field__label">SCAN_RATE</label>
    <input type="text" class="input" value="60" autofocus>
    <span class="field__helper">frames per second</span>
</div>

<div class="section-label">// invalid</div>

<div class="field">
    <label class="field__label">EMAIL</label>
    <input type="text" class="input is-invalid" value="not-an-email">
    <span class="field__helper field__helper--error">format invalid</span>
</div>

<div class="section-label">// disabled</div>

<div class="field field--disabled">
    <label class="field__label">DEVICE_ID</label>
    <input type="text" class="input" value="dev_locked_4827" disabled>
    <span class="field__helper">read-only</span>
</div>

</body>
</html>
