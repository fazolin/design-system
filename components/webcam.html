<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>webcam // fazolin/design-system</title>
<link rel="stylesheet" href="../tokens/colors.css">
<link rel="stylesheet" href="../tokens/typography.css">
<link rel="stylesheet" href="../tokens/glitch.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    background: var(--color-void);
    color: var(--color-signal);
    min-height: 100vh;
    font-family: var(--font-hud);
}
body { padding: 56px 64px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 56px; }

.section-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--color-mesh);
    border-bottom: 1px solid var(--color-mesh-dim);
    padding-bottom: 8px;
    margin-bottom: 16px;
}

.cell { display: flex; flex-direction: column; gap: 12px; }

.webcam {
    position: relative;
    aspect-ratio: 16/9;
    background: var(--color-void);
    overflow: hidden;
    width: 100%;
    border: 1px solid rgba(240, 240, 240, 0.08);
}

.webcam__layer {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 24px;
    text-align: center;
}

.webcam__title {
    font-family: var(--font-hud);
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--color-signal);
}
.webcam__sub {
    font-family: var(--font-hud);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: rgba(240, 240, 240, 0.5);
    text-transform: uppercase;
    margin-top: -8px;
}

.webcam[data-state="denied"] .webcam__title,
.webcam[data-state="error"]  .webcam__title { color: var(--color-corrupt); }

.btn {
    background: transparent;
    border: 1px solid var(--color-signal);
    color: var(--color-signal);
    font-family: var(--font-hud);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 10px 18px;
    cursor: pointer;
    border-radius: 0;
    transition: color 120ms linear, border-color 120ms linear;
}
.btn:hover { color: var(--color-corrupt); border-color: var(--color-corrupt); animation: fx-flash 80ms steps(2, end) 1; }
.btn--ghost { border-color: transparent; padding: 4px 0; }

/* loading state — scanline */
.webcam[data-state="loading"]::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: var(--color-mesh);
    animation: scan 1400ms linear infinite;
}
@keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

/* active state — fake feed */
.webcam[data-state="active"] .webcam__feed {
    position: absolute; inset: 0;
    background:
        repeating-linear-gradient(0deg, rgba(240,240,240,0.05) 0 1px, transparent 1px 3px),
        repeating-linear-gradient(90deg, rgba(0,255,255,0.04) 0 1px, transparent 1px 4px),
        radial-gradient(circle at 50% 45%, rgba(240,240,240,0.18), transparent 60%),
        var(--color-void);
}

.webcam__hud {
    position: absolute;
    top: 12px; left: 12px;
    display: flex;
    gap: 14px;
    font-family: var(--font-hud);
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--color-mesh);
    text-transform: uppercase;
    pointer-events: none;
}
.webcam__hud .dot {
    width: 6px; height: 6px;
    background: var(--color-mesh);
    align-self: center;
    margin-right: 6px;
    animation: blink 250ms steps(2, end) infinite;
}
@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

@media (prefers-reduced-motion: reduce) {
    .webcam[data-state="loading"]::before,
    .webcam__hud .dot,
    .btn:hover { animation: none; }
}
</style>
</head>
<body>

<div class="cell">
    <div class="section-label">// state: request</div>
    <div class="webcam" data-state="request">
        <div class="webcam__layer">
            <p class="webcam__title">CAMERA_REQUIRED</p>
            <p class="webcam__sub">grant access to continue</p>
            <button class="btn">GRANT ACCESS</button>
        </div>
    </div>
</div>

<div class="cell">
    <div class="section-label">// state: loading</div>
    <div class="webcam" data-state="loading">
        <div class="webcam__layer">
            <p class="webcam__title">OPENING_STREAM</p>
            <p class="webcam__sub">handshake...</p>
        </div>
    </div>
</div>

<div class="cell">
    <div class="section-label">// state: active</div>
    <div class="webcam" data-state="active">
        <div class="webcam__feed"></div>
        <div class="webcam__hud">
            <span><span class="dot"></span>1280×720</span>
            <span>30 FPS</span>
            <span>LANDMARKS: 468</span>
        </div>
    </div>
</div>

<div class="cell">
    <div class="section-label">// state: denied</div>
    <div class="webcam" data-state="denied">
        <div class="webcam__layer">
            <p class="webcam__title">CAMERA_DENIED</p>
            <p class="webcam__sub">permission required — check browser settings</p>
            <button class="btn btn--ghost">RETRY</button>
        </div>
    </div>
</div>

</body>
</html>
