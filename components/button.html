<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>button // fazolin/design-system</title>
<link rel="stylesheet" href="../tokens/colors.css">
<link rel="stylesheet" href="../tokens/typography.css">
<link rel="stylesheet" href="../tokens/glitch.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    background: var(--color-void);
    color: var(--color-signal);
    min-height: 100vh;
    font-family: var(--font-hud);
}

body {
    padding: 56px 64px;
    display: flex;
    flex-direction: column;
    gap: 48px;
}

.label {
    font-family: var(--font-hud);
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--color-mesh);
    border-bottom: 1px solid var(--color-mesh-dim);
    padding-bottom: 8px;
}

.row {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
}

/* button */
.btn {
    background: transparent;
    border: 1px solid var(--color-signal);
    color: var(--color-signal);
    font-family: var(--font-hud);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 10px 18px;
    cursor: pointer;
    border-radius: 0;
    transition: color 120ms linear, border-color 120ms linear, background-color 120ms linear;
    position: relative;
}

.btn:hover {
    color: var(--color-corrupt);
    border-color: var(--color-corrupt);
    animation: fx-flash 80ms steps(2, end) 1;
}

.btn:active {
    background: var(--color-signal);
    color: var(--color-void);
    border-color: var(--color-signal);
    animation: fx-jitter 60ms steps(4, end) 1;
}

.btn:focus-visible {
    outline: 1px solid var(--color-mesh);
    outline-offset: 2px;
}

.btn:disabled,
.btn[disabled] {
    opacity: 0.3;
    cursor: not-allowed;
    pointer-events: none;
}

.btn--destructive {
    border-color: var(--color-corrupt);
    color: var(--color-corrupt);
}
.btn--destructive:hover {
    background: var(--color-corrupt);
    color: var(--color-void);
    border-color: var(--color-corrupt);
}
.btn--destructive:active {
    background: var(--color-corrupt-dim);
    color: var(--color-void);
}

.btn--ghost {
    border-color: transparent;
    padding-left: 0;
    padding-right: 0;
}
.btn--ghost:hover {
    color: var(--color-corrupt);
    border-color: transparent;
}

@media (prefers-reduced-motion: reduce) {
    .btn:hover,
    .btn:active {
        animation: none;
    }
}
</style>
</head>
<body>

<div>
    <div class="label">// default</div>
    <div class="row" style="margin-top: 24px;">
        <button class="btn">SCAN</button>
        <button class="btn">CONNECT</button>
        <button class="btn">RECORD</button>
    </div>
</div>

<div>
    <div class="label">// destructive</div>
    <div class="row" style="margin-top: 24px;">
        <button class="btn btn--destructive">ABORT</button>
        <button class="btn btn--destructive">RESET</button>
        <button class="btn btn--destructive">DELETE</button>
    </div>
</div>

<div>
    <div class="label">// ghost</div>
    <div class="row" style="margin-top: 24px;">
        <button class="btn btn--ghost">CANCEL</button>
        <button class="btn btn--ghost">SKIP</button>
        <button class="btn btn--ghost">BACK</button>
    </div>
</div>

<div>
    <div class="label">// disabled</div>
    <div class="row" style="margin-top: 24px;">
        <button class="btn" disabled>OFFLINE</button>
        <button class="btn btn--destructive" disabled>NO_TARGET</button>
        <button class="btn btn--ghost" disabled>UNAVAILABLE</button>
    </div>
</div>

</body>
</html>
