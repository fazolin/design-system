<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>status // fazolin/design-system</title>
<link rel="stylesheet" href="../tokens/colors.css">
<link rel="stylesheet" href="../tokens/typography.css">
<link rel="stylesheet" href="../tokens/glitch.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    background: var(--color-void);
    color: var(--color-signal);
    min-height: 100vh;
    font-family: var(--font-hud);
}
body { padding: 56px 64px; display: flex; flex-direction: column; gap: 36px; }

.section-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--color-mesh);
    border-bottom: 1px solid var(--color-mesh-dim);
    padding-bottom: 8px;
    margin-bottom: 16px;
    margin-top: 24px;
}
.section-label:first-of-type { margin-top: 0; }

.status {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: var(--font-hud);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
}
.status__dot { width: 6px; height: 6px; background: var(--color-signal); }

.status--scanning .status__dot { background: var(--color-mesh); }
.status--scanning .status__label { color: var(--color-signal); }

.status--idle .status__dot { background: rgba(240, 240, 240, 0.4); }
.status--idle .status__label { color: rgba(240, 240, 240, 0.6); }

.status--error .status__dot { background: var(--color-corrupt); }
.status--error .status__label { color: var(--color-corrupt); }

.status--offline .status__dot { background: rgba(240, 240, 240, 0.15); }
.status--offline .status__label { color: rgba(240, 240, 240, 0.3); }

.status--blink .status__dot { animation: blink 250ms steps(2, end) infinite; }

@keyframes blink {
    0%, 49%   { opacity: 1; }
    50%, 100% { opacity: 0; }
}

@media (prefers-reduced-motion: reduce) {
    .status--blink .status__dot { animation: none; }
}

.row { display: flex; flex-wrap: wrap; gap: 28px; }
</style>
</head>
<body>

<div class="section-label">// states</div>
<div class="row">
    <div class="status status--scanning"><span class="status__dot"></span><span class="status__label">SCAN_ACTIVE</span></div>
    <div class="status status--idle"><span class="status__dot"></span><span class="status__label">IDLE</span></div>
    <div class="status status--error"><span class="status__dot"></span><span class="status__label">CAMERA_DENIED</span></div>
    <div class="status status--offline"><span class="status__dot"></span><span class="status__label">OFFLINE</span></div>
</div>

<div class="section-label">// alive (idle tick)</div>
<div class="row">
    <div class="status status--scanning"><span class="status__dot fx-alive"></span><span class="status__label fx-alive">SIGNAL_ALIVE</span></div>
    <div class="status status--scanning"><span class="status__dot fx-alive"></span><span class="status__label">STREAM_OPEN</span></div>
</div>

<div class="section-label">// blink (critical)</div>
<div class="row">
    <div class="status status--error status--blink"><span class="status__dot"></span><span class="status__label">FRAME_DROP</span></div>
    <div class="status status--scanning status--blink"><span class="status__dot"></span><span class="status__label">RECORDING</span></div>
</div>

<div class="section-label">// stacked (typical work HUD)</div>
<div style="display: flex; flex-direction: column; gap: 10px;">
    <div class="status status--scanning"><span class="status__dot"></span><span class="status__label">CAMERA: CONNECTED</span></div>
    <div class="status status--scanning"><span class="status__dot"></span><span class="status__label">LANDMARKS: 468</span></div>
    <div class="status status--idle"><span class="status__dot"></span><span class="status__label">AUDIO: STANDBY</span></div>
    <div class="status status--offline"><span class="status__dot"></span><span class="status__label">GPU: LOW_PERF</span></div>
</div>

</body>
</html>
